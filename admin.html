<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления | Wood & Steel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>body { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-[#FBF9F6] text-[#33302E] min-h-screen flex items-center justify-center p-6">

    <div class="max-w-xl w-full bg-white p-8 rounded-sm shadow-sm border border-[#EAE3DA] space-y-8">
        
        <!-- Шапка анкеты -->
        <div class="text-center space-y-2">
            <h1 class="text-xl uppercase tracking-wider font-light text-[#5A524A]">Добавление новой работы</h1>
            <div class="w-12 h-[1px] bg-[#8C7E70] mx-auto"></div>
            <p class="text-xs text-[#706961] font-light">Заполните анкету ниже, чтобы проект мгновенно появился на сайте.</p>
        </div>

        <!-- Анкета-форма -->
        <form id="adminForm" class="space-y-6">
            <div>
                <label class="block text-xs uppercase tracking-wider text-[#706961] mb-2 font-medium">Название проекта *</label>
                <input type="text" id="projTitle" required placeholder="Например: Парящие полки для шоурума" class="w-full px-4 py-3 bg-[#FBF9F6] border border-[#EAE3DA] rounded-sm focus:outline-none focus:border-[#8C7E70] text-sm">
            </div>

            <div>
                <label class="block text-xs uppercase tracking-wider text-[#706961] mb-2 font-medium">Категория (Тег) *</label>
                <select id="projTag" class="w-full px-4 py-3 bg-[#FBF9F6] border border-[#EAE3DA] rounded-sm focus:outline-none focus:border-[#8C7E70] text-sm">
                    <option value="Бутик">Бутик / Торговое оборудование</option>
                    <option value="Дом">Мебель для дома</option>
                    <option value="Интерьер">Декор и Pinterest полки</option>
                </select>
            </div>

            <div>
                <label class="block text-xs uppercase tracking-wider text-[#706961] mb-2 font-medium">Фотография проекта *</label>
                <div class="w-full border border-dashed border-[#EAE3DA] bg-[#FBF9F6] p-6 text-center rounded-sm cursor-pointer hover:border-[#8C7E70] transition-colors relative">
                    <input type="file" id="projFile" accept="image/*" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <div id="uploadPlaceholder" class="space-y-2">
                        <span class="text-2xl">📷</span>
                        <p class="text-xs text-[#706961]">Нажмите для выбора фото с телефона или ПК</p>
                    </div>
                    <img id="previewImg" class="hidden max-h-48 mx-auto object-cover mt-2 rounded-sm" />
                </div>
            </div>

            <div class="pt-4 flex space-x-4">
                <a href="index.html" class="w-1/3 text-center border border-[#EAE3DA] text-[#706961] text-xs uppercase tracking-wider py-4 rounded-sm hover:bg-gray-50 transition-colors flex items-center justify-center">
                    На сайт
                </a>
                <button type="submit" class="w-2/3 bg-[#5A524A] text-white text-xs font-medium tracking-wider uppercase py-4 rounded-sm hover:bg-[#433C36] transition-colors shadow-sm">
                    Опубликовать проект
                </button>
            </div>
        </form>

        <!-- Список текущих работ для удаления -->
        <div class="border-t border-[#EAE3DA] pt-6 space-y-4">
            <h3 class="text-xs uppercase tracking-wider text-[#706961] font-medium">Текущие работы на сайте:</h3>
            <div id="adminLibrary" class="space-y-2 max-h-60 overflow-y-auto pr-2"></div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('projFile');
        const previewImg = document.getElementById('previewImg');
        const placeholder = document.getElementById('uploadPlaceholder');
        let base64Image = "";

        // Превью выбранного фото и конвертация в строку (Base64) для сохранения
        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    base64Image = e.target.result;
                    previewImg.src = base64Image;
                    previewImg.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        });

        // База данных в памяти браузера
        const defaultProjects = [
            { tag: "Коммерция", title: "Стеллажи и кронштейны для бутика", img: "https://images.unsplash.com/photo-1600585154526-990dced4db0d?auto=format&fit=crop&w=600&q=80" },
            { tag: "Дом", title: "Минималистичная столешница для ПК", img: "https://images.unsplash.com/photo-1595515106969-1ce29566ff1c?auto=format&fit=crop&w=600&q=80" }
        ];

        let list = JSON.parse(localStorage.getItem('wood_steel_projects')) || defaultProjects;

        function renderAdminList() {
            const lib = document.getElementById('adminLibrary');
            lib.innerHTML = list.map((p, i) => `
                <div class="flex items-center justify-between p-3 bg-[#FBF9F6] border border-[#EAE3DA] text-xs">
                    <span class="truncate font-medium max-w-[70%]">${p.title} (${p.tag})</span>
                    <button onclick="deleteItem(${i})" class="text-red-500 hover:underline">Удалить</button>
                </div>
            `).join('');
        }

        document.getElementById('adminForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const title = document.getElementById('projTitle').value;
            const tag = document.getElementById('projTag').value;

            if(title && tag && base64Image) {
                list.push({ tag, title, img: base64Image });
                localStorage.setItem('wood_steel_projects', JSON.stringify(list));
                alert('Проект успешно опубликован на главную страницу!');
                document.getElementById('adminForm').reset();
                previewImg.classList.add('hidden');
                placeholder.classList.remove('hidden');
                base64Image = "";
                renderAdminList();
            }
        });

        window.deleteItem = function(index) {
            if(confirm('Удалить этот проект с сайта?')) {
                list.splice(index, 1);
                localStorage.setItem('wood_steel_projects', JSON.stringify(list));
                renderAdminList();
            }
        }

        renderAdminList();
    </script>
</body>
</html>
